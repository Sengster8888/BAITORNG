<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Growing Together - Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">

    <div class="p-10 border-b text-center">
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 bg-green-100 rounded-3xl flex items-center justify-center">
          <i class="fa-solid fa-lock text-green-600 text-4xl"></i>
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Reset Password</h2>
      <p class="text-gray-500 mt-2">Create a new strong password</p>
    </div>

    <div class="p-10">
      <form id="resetForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">RESET CODE (OTP)</label>
          <div class="relative">
            <i class="fa-solid fa-key absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="otp" placeholder="123456" required
                   class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-green-500"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">NEW PASSWORD</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
            <input type="password" id="newPassword" placeholder="••••••••" required
                   class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-green-500"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">CONFIRM NEW PASSWORD</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
            <input type="password" id="confirmNewPassword" placeholder="••••••••" required
                   class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-green-500"/>
          </div>
        </div>

        <button 
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl text-lg transition">
          Reset Password
        </button>
      </form>

      <div class="text-center mt-8">
        <a href="login.html" class="text-green-600 hover:underline font-medium">
          ← Back to Login
        </a>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0`;
      toast.innerHTML = `<i class="fa-solid ${icon} text-xl"></i><span class="font-medium">${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
      setTimeout(() => {
        toast.classList.add('translate-x-full', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const phone = localStorage.getItem('pendingResetPhone');
      const otp = document.getElementById('otp').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmNewPassword = document.getElementById('confirmNewPassword').value;

      if (!phone) {
        showToast('Missing phone number. Please start again.', 'error');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        return;
      }

      if (newPassword !== confirmNewPassword) {
        showToast('Passwords do not match.', 'error');
        return;
      }

      try {
        const response = await fetch('http://localhost:5001/api/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, otp, newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          showToast('Password reset successful! Redirecting to login...', 'success');
          localStorage.removeItem('pendingResetPhone');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showToast(data.message, 'error');
        }
      } catch (err) {
        showToast('An error occurred during password reset.', 'error');
      }
    });
  </script>
</body>
</html>
